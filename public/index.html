<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telegram Cloud Storage</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <h1><i class="fab fa-telegram"></i> Telegram Cloud Storage</h1>
        <div class="breadcrumb" id="breadcrumb"></div>
      </header>

      <div class="toolbar">
        <button id="newFolderBtn" class="btn btn-primary">
          <i class="fas fa-folder-plus"></i> New Folder
        </button>
        <button id="uploadBtn" class="btn btn-success">
          <i class="fas fa-upload"></i> Upload File
        </button>
        <input type="file" id="fileInput" style="display: none" multiple />
      </div>

      <div class="content" id="content">
        <div class="loading">Loading...</div>
      </div>
    </div>

    <!-- New Folder Modal -->
    <div id="folderModal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Create New Folder</h2>
        <input type="text" id="folderName" placeholder="Folder name" />
        <button id="createFolderBtn" class="btn btn-primary">Create</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
