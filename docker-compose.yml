version: "3.8"

services:
  telegram-storage:
    build: .
    container_name: telegram-cloud-storage
    ports:
      - "3010:3000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_SESSION=${TELEGRAM_SESSION}
      - STORAGE_CHANNEL=${STORAGE_CHANNEL}
    restart: unless-stopped
